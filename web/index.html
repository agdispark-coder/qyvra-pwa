<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Primary Meta Tags -->
  <title>QYVRA - Women's Wellness Tracker</title>
  <meta name="description" content="Track your cycle, nutrition, and feel your best every day with QYVRA.">
  <meta name="theme-color" content="#C4607A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="QYVRA">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="QYVRA">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- iOS Splash Screens -->
  <link rel="apple-touch-startup-image" href="icons/Icon-192.png">

  <style>
    body {
      background-color: #FAF7F4;
      margin: 0;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #FAF7F4;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #F0EBE5;
      border-top-color: #C4607A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      margin-top: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      color: #C4607A;
      font-weight: 600;
      letter-spacing: 2px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">QYVRA</div>
  </div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('flutter-first-frame', function () {
        navigator.serviceWorker.register('flutter_service_worker.js');
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
